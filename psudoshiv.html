<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0px;
        }
        .box{
            background-color: aqua;
            height: 100px;
            width: 100px;
            margin: 10px;
        }
        .box:hover{
            cursor: pointer;
            background-color: red;
        } 
        #box2::before{
            content:"0";
            background-color: yellow;
        }
           #box2::after{
            content:"2";
            background-color: yellow;
        }
        /* .box:nth-child(5){
            background-color: blue;
        } */
         .box:nth-child(even){
            background-color: violet;
         }
         .box:nth-child(odd){
            background-color: springgreen;
         }
    </style>
</head>
<body>
    <div class="box" id="box1">1</div>
    <div class="box" id="box2">1</div>
    <div class="box" id="box3">1</div>
    <div class="box" id="box4">1</div>
    <div class="box" id="box5">1</div>
    <div class="box" id="box6">1</div>
    <div class="box" id="box7">1</div>
    <div class="box" id="box8">1</div>
    <div class="box" id="box9">1</div>
    <div class="box" id="box10">1</div>
</body> 
</html>
